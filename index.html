<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hottest NFL QB — Ranker</title>
<style>
  :root{
    --bg1:#0a0e1a; --bg2:#131a2e; --card:#1b2238; --line:#2a3354;
    --txt:#eef2ff; --muted:#9aa6c9; --accent:#ffd84d; --win:#37d67a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 700px at 50% -10%,var(--bg2),var(--bg1));
    color:var(--txt); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; padding:16px 22px; border-bottom:1px solid var(--line);
    position:sticky; top:0; backdrop-filter:blur(8px);
    background:rgba(10,14,26,.72); z-index:5;
  }
  .brand{display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:.3px}
  .brand .flame{font-size:22px}
  .brand h1{font-size:17px}
  .brand small{display:block; font-weight:500; color:var(--muted); font-size:11px; letter-spacing:.2px}
  .tools{display:flex; gap:8px; flex-wrap:wrap}
  button.btn{
    font:inherit; font-weight:600; font-size:13px; color:var(--txt);
    background:var(--card); border:1px solid var(--line); padding:9px 14px;
    border-radius:10px; cursor:pointer; transition:.15s;
  }
  button.btn:hover{border-color:var(--accent); color:var(--accent)}
  button.btn.primary{background:var(--accent); color:#1a1300; border-color:var(--accent); font-weight:800}
  button.btn.primary:hover{filter:brightness(1.05); color:#1a1300}
  .stat{font-size:12px; color:var(--muted); align-self:center; white-space:nowrap}
  .stat b{color:var(--txt)}

  main{max-width:1050px; margin:0 auto; padding:24px 18px 60px}
  .banner{text-align:center; margin-bottom:6px}
  .banner .phase{display:inline-block; font-size:12px; font-weight:800; letter-spacing:1.2px;
                 text-transform:uppercase; color:#1a1300; background:var(--accent);
                 padding:4px 12px; border-radius:999px}
  .banner .phase.finals{background:var(--win)}
  .prompt{text-align:center; color:var(--muted); font-size:14px; margin:12px 0 18px}
  .prompt b{color:var(--accent)}

  /* progress bar */
  .pbar{max-width:420px; margin:0 auto 16px; height:7px; background:var(--card);
        border:1px solid var(--line); border-radius:999px; overflow:hidden}
  .pbar > div{height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--win)); transition:width .3s}

  .arena{display:grid; grid-template-columns:1fr 64px 1fr; gap:14px; align-items:stretch}
  .vs{display:flex; align-items:center; justify-content:center; font-weight:900;
      font-style:italic; color:var(--muted); font-size:20px}

  .pick{
    position:relative; background:var(--card); border:2px solid var(--line);
    border-radius:18px; overflow:hidden; cursor:pointer; transition:transform .12s, border-color .15s, box-shadow .15s;
    display:flex; flex-direction:column; min-height:430px;
  }
  .pick:hover{transform:translateY(-4px); border-color:var(--accent); box-shadow:0 14px 40px rgba(0,0,0,.45)}
  .pick:active{transform:scale(.99)}
  .pick.flash{border-color:var(--win); box-shadow:0 0 0 3px rgba(55,214,122,.35)}
  .pick.champ-tag::after{
    content:"👑 STAYS"; position:absolute; top:12px; left:12px; z-index:3;
    background:rgba(255,216,77,.92); color:#1a1300; font-size:11px; font-weight:800;
    letter-spacing:.5px; padding:4px 9px; border-radius:999px;
  }
  .photo{
    flex:1; display:flex; align-items:flex-end; justify-content:center;
    background:linear-gradient(180deg,var(--team) 0%, #0d1322 78%);
    position:relative; min-height:300px;
  }
  .photo img{max-height:330px; max-width:100%; width:auto; display:block; filter:drop-shadow(0 18px 24px rgba(0,0,0,.5))}
  .photo .fallback{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; width:100%}
  .photo .fallback .initials{
    font-size:74px; font-weight:900; color:rgba(255,255,255,.92);
    width:140px; height:140px; border-radius:50%; background:rgba(0,0,0,.28);
    display:flex; align-items:center; justify-content:center; border:2px solid rgba(255,255,255,.25);
  }
  .meta{padding:14px 16px; text-align:center; border-top:1px solid var(--line); background:rgba(0,0,0,.18)}
  .meta .name{font-size:20px; font-weight:800}
  .meta .team{font-size:12px; color:var(--muted); margin-top:2px; letter-spacing:.6px; text-transform:uppercase}

  .hint{text-align:center; color:var(--muted); font-size:12px; margin-top:18px}
  kbd{background:var(--card); border:1px solid var(--line); border-bottom-width:2px;
      border-radius:6px; padding:1px 7px; font-size:12px; font-family:inherit}

  /* overlays */
  .overlay{position:fixed; inset:0; background:rgba(6,9,18,.82); backdrop-filter:blur(6px);
           display:none; align-items:flex-start; justify-content:center; z-index:20; padding:40px 16px; overflow:auto}
  .overlay.open{display:flex}
  .board{background:var(--bg2); border:1px solid var(--line); border-radius:18px;
         width:100%; max-width:560px; padding:22px 20px 24px; text-align:center}
  .board h2{font-size:22px; margin-bottom:8px}
  .board p.sub{color:var(--muted); font-size:14px; margin-bottom:18px; line-height:1.5}
  .board p.sub b{color:var(--txt)}

  .chips{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:22px}
  .chip{background:var(--card); border:1px solid var(--line); border-radius:999px;
        padding:7px 13px; font-size:13px; font-weight:600}
  .chip span{color:var(--muted); font-weight:500; font-size:11px}

  /* podium results */
  .prow{display:grid; grid-template-columns:50px 56px 1fr auto; align-items:center;
        gap:12px; padding:11px 8px; border-top:1px solid var(--line); text-align:left}
  .prow:first-of-type{border-top:none}
  .prow .rk{font-size:24px; font-weight:900; text-align:center; color:var(--muted)}
  .prow.gold .rk{color:#ffd84d} .prow.silver .rk{color:#cfd8ec} .prow.bronze .rk{color:#e6a86b}
  .prow .av{width:54px; height:54px; border-radius:50%; overflow:hidden; background:#0d1322;
            display:flex; align-items:flex-end; justify-content:center; border:1px solid var(--line)}
  .prow .av img{width:100%; height:100%; object-fit:cover; object-position:top center}
  .prow .av .ini{font-size:20px; font-weight:800; color:#fff; align-self:center}
  .prow .nm{font-weight:700; font-size:16px}
  .prow .tm{color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.5px}
  .prow .lk{color:var(--muted); font-size:12px; text-align:right; white-space:nowrap}
  .prow.gold{background:linear-gradient(90deg,rgba(255,216,77,.12),transparent); border-radius:12px}

  .actions{display:flex; gap:10px; justify-content:center; margin-top:22px}

  @media(max-width:680px){
    .arena{grid-template-columns:1fr; gap:10px}
    .vs{order:2; padding:2px}
    .pick{min-height:330px}
    .photo img{max-height:240px} .photo{min-height:230px}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="flame">🔥</span>
    <div><h1>Hottest NFL QB</h1><small>Gauntlet → Finals → Top 5</small></div>
  </div>
  <div class="tools">
    <span class="stat" id="progressStat"></span>
    <button class="btn" id="resetBtn">↺ Start over</button>
  </div>
</header>

<main>
  <div class="banner"><span class="phase" id="phaseTag">Round 1 · The Gauntlet</span></div>
  <p class="prompt">Who's <b>hotter</b>? Click a card — or use <kbd>←</kbd> / <kbd>→</kbd>.</p>
  <div class="pbar"><div id="pbarFill"></div></div>
  <div class="arena">
    <div class="pick" id="left"></div>
    <div class="vs">VS</div>
    <div class="pick" id="right"></div>
  </div>
  <p class="hint" id="hint">Every QB appears <b>once</b>. The hotter one stays up; the loser is out. Winners advance to the Finals.</p>
</main>

<!-- Finals intro -->
<div class="overlay" id="interstitial">
  <div class="board">
    <h2>🏆 Finals time</h2>
    <p class="sub" id="interSub"></p>
    <div class="chips" id="finalistChips"></div>
    <button class="btn primary" id="startFinalsBtn">Start the Finals →</button>
  </div>
</div>

<!-- Final results -->
<div class="overlay" id="results">
  <div class="board">
    <h2>🔥 Your Hottest QB — Top 5</h2>
    <p class="sub" id="resultsSub"></p>
    <div id="podium"></div>
    <div class="actions">
      <button class="btn" id="copyBtn">📋 Copy results</button>
      <button class="btn primary" id="playAgainBtn">Play again</button>
    </div>
  </div>
</div>

<script>
/* ---------- 2025 NFL starting QBs (swap any photo by changing the ESPN id) ---------- */
const QBS = [
  {n:"Jacoby Brissett",  t:"Cardinals",  ab:"ARI", id:"2578570", c:"#97233F", img:"images/2578570.avif"},
  {n:"Michael Penix Jr.",t:"Falcons",    ab:"ATL", id:"4360423", c:"#A71930", img:"images/4360423.png"},
  {n:"Tua Tagovailoa",   t:"Falcons",    ab:"ATL", id:"4241479", c:"#A71930", img:"images/4241479.png"},
  {n:"Lamar Jackson",    t:"Ravens",     ab:"BAL", id:"3916387", c:"#241773", img:"images/3916387.png"},
  {n:"Josh Allen",       t:"Bills",      ab:"BUF", id:"3918298", c:"#00338D", img:"images/3918298.png"},
  {n:"Bryce Young",      t:"Panthers",   ab:"CAR", id:"4685720", c:"#0085CA", img:"images/4685720.png"},
  {n:"Caleb Williams",   t:"Bears",      ab:"CHI", id:"4431611", c:"#0B162A", img:"images/4431611.webp"},
  {n:"Joe Burrow",       t:"Bengals",    ab:"CIN", id:"3915511", c:"#FB4F14", img:"images/3915511.png"},
  {n:"Shedeur Sanders",  t:"Browns",     ab:"CLE", id:"4432762", c:"#311D00", img:"images/4432762.png"},
  {n:"Deshaun Watson",   t:"Browns",     ab:"CLE", id:"3122840", c:"#311D00", img:"images/3122840.png"},
  {n:"Dak Prescott",     t:"Cowboys",    ab:"DAL", id:"2577417", c:"#003594", img:"images/2577417.png"},
  {n:"Bo Nix",           t:"Broncos",    ab:"DEN", id:"4426338", c:"#FB4F14", img:"images/4426338.png"},
  {n:"Jared Goff",       t:"Lions",      ab:"DET", id:"3046779", c:"#0076B6", img:"images/3046779.png"},
  {n:"Jordan Love",      t:"Packers",    ab:"GB",  id:"4036378", c:"#203731", img:"images/4036378.png"},
  {n:"C.J. Stroud",      t:"Texans",     ab:"HOU", id:"4432577", c:"#03202F", img:"images/4432577.png"},
  {n:"Daniel Jones",     t:"Colts",      ab:"IND", id:"3917792", c:"#002C5F", img:"images/3917792.png"},
  {n:"Trevor Lawrence",  t:"Jaguars",    ab:"JAX", id:"4360310", c:"#006778", img:"images/4360310.png"},
  {n:"Patrick Mahomes",  t:"Chiefs",     ab:"KC",  id:"3139477", c:"#E31837", img:"images/3139477.png"},
  {n:"Justin Herbert",   t:"Chargers",   ab:"LAC", id:"4038941", c:"#0080C6", img:"images/4038941.png"},
  {n:"Matthew Stafford", t:"Rams",       ab:"LAR", id:"12483",   c:"#003594", img:"images/12483.png"},
  {n:"Fernando Mendoza", t:"Raiders",    ab:"LV",  id:"4837248", c:"#000000", img:"images/4837248.png"},
  {n:"Malik Willis",     t:"Dolphins",   ab:"MIA", id:"4242512", c:"#008E97", img:"images/4242512.png"},
  {n:"Kyler Murray",     t:"Vikings",    ab:"MIN", id:"3917315", c:"#4F2683", img:"images/3917315.png"},
  {n:"Drake Maye",       t:"Patriots",   ab:"NE",  id:"4431452", c:"#002244", img:"images/4431452.png"},
  {n:"Tyler Shough",     t:"Saints",     ab:"NO",  id:"4360689", c:"#9b8a55", img:"images/4360689.png"},
  {n:"Jaxson Dart",      t:"Giants",     ab:"NYG", id:"4689114", c:"#0B2265", img:"images/4689114.avif"},
  {n:"Geno Smith",       t:"Jets",       ab:"NYJ", id:"15864",   c:"#125740", img:"images/15864.png"},
  {n:"Jalen Hurts",      t:"Eagles",     ab:"PHI", id:"4040715", c:"#004C54", img:"images/4040715.png"},
  {n:"Aaron Rodgers",    t:"Steelers",   ab:"PIT", id:"8439",    c:"#b9890d", img:"images/8439.png"},
  {n:"Sam Darnold",      t:"Seahawks",   ab:"SEA", id:"3912547", c:"#002244", img:"images/3912547.png"},
  {n:"Brock Purdy",      t:"49ers",      ab:"SF",  id:"4361741", c:"#AA0000", img:"images/4361741.png"},
  {n:"Baker Mayfield",   t:"Buccaneers", ab:"TB",  id:"3052587", c:"#D50A0A", img:"images/3052587.png"},
  {n:"Cam Ward",         t:"Titans",     ab:"TEN", id:"4688380", c:"#4B92DB", img:"images/4688380.png"},
  {n:"Jayden Daniels",   t:"Commanders", ab:"WAS", id:"4426348", c:"#5A1414", img:"images/4426348.png"},
];
const PHOTO = id => `https://a.espncdn.com/i/headshots/nfl/players/full/${id}.png`;
const imgURL = q => q.img || PHOTO(q.id);   // q.img overrides the default ESPN headshot
const byId = id => QBS.find(q=>q.id===id);
const initials = n => n.split(" ").map(w=>w[0]).slice(0,2).join("");
const MAX_FINALISTS = 8;   // cap the playoff pool so the Finals stay short

/* ---------- state ---------- */
const STORE = "qbHotRanker.v3";
let state;

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]];} return a; }

function fresh(){
  const order = shuffle(QBS.map(q=>q.id));
  const champ = order.shift(), challenger = order.shift();
  return {
    phase:"gauntlet",
    queue:order, champ, challenger,
    wins:Object.fromEntries(QBS.map(q=>[q.id,0])),
    losses:Object.fromEntries(QBS.map(q=>[q.id,0])),
    finals:null, podium:[], votes:0
  };
}
function load(){
  try{ const s=JSON.parse(localStorage.getItem(STORE));
       if(s && s.wins && Object.keys(s.wins).length===QBS.length && s.phase) return s; }catch(e){}
  return fresh();
}
function save(){ try{ localStorage.setItem(STORE, JSON.stringify(state)); }catch(e){} }

/* ---------- card rendering ---------- */
function cardHTML(q){
  return `
    <div class="photo" style="--team:${q.c}">
      <img src="${imgURL(q)}" alt="${q.n}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div class="fallback" style="display:none"><div class="initials">${initials(q.n)}</div></div>
    </div>
    <div class="meta">
      <div class="name">${q.n}</div>
      <div class="team">${q.t} · ${q.ab}</div>
    </div>`;
}
function renderMatch(){
  let L, R;
  if(state.phase==="finals"){ L=byId(state.finals.champ); R=byId(state.finals.challenger); }
  else { L=byId(state.champ); R=byId(state.challenger); }   // gauntlet + interstitial use last gauntlet pair
  const left=document.getElementById("left"), right=document.getElementById("right");
  left.className="pick champ-tag"; left.innerHTML=cardHTML(L);
  right.className="pick"; right.innerHTML=cardHTML(R);

  const isFinals = state.phase==="finals";
  const tag=document.getElementById("phaseTag");
  if(isFinals){
    tag.className="phase finals";
    tag.textContent=`Finals · deciding #${state.podium.length+1}`;
    document.getElementById("hint").innerHTML="Final round! Keep the hotter one up to lock in each spot in your Top 5.";
  } else {
    tag.className="phase";
    const seen = QBS.length - state.queue.length;
    tag.textContent=`The Gauntlet · ${seen}/${QBS.length}`;
    document.getElementById("hint").innerHTML="Every QB appears <b>once</b>. The hotter one stays up; the loser is out. Winners advance to the Finals.";
  }
  // progress
  let pct;
  if(isFinals){ pct = 60 + 40*(state.podium.length/5); }
  else { pct = 60*((QBS.length - state.queue.length)/QBS.length); }
  document.getElementById("pbarFill").style.width = Math.min(100,pct)+"%";
  document.getElementById("progressStat").innerHTML = isFinals
    ? `Finals · <b>${state.podium.length}</b>/5 locked`
    : `Seen <b>${QBS.length - state.queue.length}</b>/${QBS.length}`;
}
function flashThenRender(side){
  document.getElementById(side).classList.add("flash");
  setTimeout(renderMatch, 130);
}

/* ---------- phase 1: gauntlet ---------- */
function gauntletVote(side){
  const winner = side==="left" ? state.champ : state.challenger;
  const loser  = side==="left" ? state.challenger : state.champ;
  state.wins[winner]++; state.losses[loser]++; state.votes++;
  state.champ = winner;
  if(state.queue.length>0){
    state.challenger = state.queue.shift();
    save(); flashThenRender(side);
  } else {
    enterInterstitial(); save();
  }
}

/* ---------- transition ---------- */
function finalistPool(){
  return QBS.filter(q=>state.wins[q.id]>0)
            .sort((a,b)=>state.wins[b.id]-state.wins[a.id])
            .slice(0,MAX_FINALISTS)
            .map(q=>q.id);
}
function enterInterstitial(){
  state.phase="interstitial";
  state.finals={ pool:finalistPool(), champ:null, challenger:null, rest:[] };
  save(); showInterstitial();
}
function showInterstitial(){
  const pool=state.finals.pool;
  document.getElementById("interSub").innerHTML =
    `<b>${pool.length}</b> quarterback${pool.length!==1?"s":""} won at least one matchup and made the cut. `+
    `Now we'll crown your <b>Top 5</b>.`;
  document.getElementById("finalistChips").innerHTML = pool.map(id=>{
    const q=byId(id);
    return `<div class="chip">${q.n} <span>${state.wins[id]}♥</span></div>`;
  }).join("");
  document.getElementById("interstitial").classList.add("open");
}

/* ---------- phase 2: finals (selection-sort by king-of-the-hill) ---------- */
function nextRank(){
  // returns true if a new match is set up, false if the game is finished
  const f=state.finals;
  if(state.podium.length>=5 || f.pool.length===0){ finishGame(); return false; }
  if(f.pool.length===1){ state.podium.push(f.pool[0]); f.pool=[]; finishGame(); return false; }
  f.champ = f.pool[0];
  f.rest  = f.pool.slice(1);
  f.challenger = f.rest.shift();
  return true;
}
function startFinals(){
  document.getElementById("interstitial").classList.remove("open");
  state.phase="finals";
  if(nextRank()){ save(); renderMatch(); }
}
function finalsVote(side){
  const f=state.finals;
  const winner = side==="left" ? f.champ : f.challenger;
  state.wins[winner]++; state.votes++;
  f.champ = winner;                     // best-so-far stays up
  if(f.rest.length>0){
    f.challenger = f.rest.shift();
    save(); flashThenRender(side);
  } else {
    // champ is the hottest remaining → lock the next spot
    state.podium.push(f.champ);
    f.pool = f.pool.filter(id=>id!==f.champ);
    if(nextRank()){ save(); flashThenRender(side); }
    else { save(); }
  }
}

/* ---------- results ---------- */
function avatarHTML(q){
  return `<div class="av">
      <img src="${imgURL(q)}" alt="${q.n}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ini',textContent:'${initials(q.n)}'}))">
    </div>`;
}
function finishGame(){
  state.phase="done"; save(); showResults();
}
function showResults(){
  const medal=["gold","silver","bronze"];
  document.getElementById("resultsSub").innerHTML =
    `Ranked from <b>${state.finals.pool.length+state.podium.length}</b> finalists across <b>${state.votes}</b> picks.`;
  document.getElementById("podium").innerHTML = state.podium.map((id,i)=>{
    const q=byId(id);
    return `<div class="prow ${medal[i]||""}">
      <div class="rk">${i+1}</div>
      ${avatarHTML(q)}
      <div><div class="nm">${q.n}</div><div class="tm">${q.t}</div></div>
      <div class="lk">${state.wins[id]} ♥</div>
    </div>`;
  }).join("");
  document.getElementById("results").classList.add("open");
}
function copyResults(){
  const txt = "🔥 My Hottest NFL QB Top 5:\n" +
    state.podium.map((id,i)=>`${i+1}. ${byId(id).n} (${byId(id).ab})`).join("\n");
  navigator.clipboard?.writeText(txt).then(
    ()=>{ const b=document.getElementById("copyBtn"); b.textContent="✓ Copied!"; setTimeout(()=>b.textContent="📋 Copy results",1500); },
    ()=>{}
  );
}

/* ---------- dispatch & wiring ---------- */
function handleVote(side){
  if(state.phase==="gauntlet") gauntletVote(side);
  else if(state.phase==="finals") finalsVote(side);
}
document.getElementById("left").addEventListener("click", ()=>handleVote("left"));
document.getElementById("right").addEventListener("click", ()=>handleVote("right"));
document.addEventListener("keydown", e=>{
  if(document.querySelector(".overlay.open")) return;
  if(e.key==="ArrowLeft") handleVote("left");
  if(e.key==="ArrowRight") handleVote("right");
});
document.getElementById("startFinalsBtn").addEventListener("click", startFinals);
document.getElementById("copyBtn").addEventListener("click", copyResults);
document.getElementById("playAgainBtn").addEventListener("click", ()=>{
  document.getElementById("results").classList.remove("open");
  state=fresh(); save(); renderMatch();
});
document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(confirm("Start over from the beginning?")){
    document.querySelectorAll(".overlay").forEach(o=>o.classList.remove("open"));
    state=fresh(); save(); renderMatch();
  }
});

/* ---------- boot ---------- */
state=load();
if(state.phase==="done"){ renderMatch(); showResults(); }
else if(state.phase==="interstitial"){ renderMatch(); showInterstitial(); }
else { renderMatch(); }
</script>
</body>
</html>
